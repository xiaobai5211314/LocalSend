name: localsend_enhanced
description: Enhanced LocalSend with NAT traversal, clipboard sync, and more
version: 2.1.0+1
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  file_picker: ^8.1.6
  file_selector: ^1.0.3
  file_selector_windows: ^0.9.3+2
  window_manager: ^0.4.3
  tray_manager: ^0.3.0
  http: ^1.2.2
  qr_flutter: ^4.1.0
  clipboard: ^3.0.14
  network_info_plus: ^6.1.0
  watcher: ^1.1.0
  dio: ^5.7.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  msix: ^3.16.8

flutter:
  uses-material-design: true
  assets:
    - assets/
