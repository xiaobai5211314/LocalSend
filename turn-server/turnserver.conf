# ============================================================================
# LocalSend TURN Server Configuration (coturn 4.6)
# ============================================================================

# ---- Listening ----
# Listen on all interfaces for both UDP and TCP
listening-port=3478
listening-ip=0.0.0.0

# Enable both UDP and TCP relay transports
relay-ip=0.0.0.0

# External IP advertised to clients (required for NAT traversal)
external-ip=101.132.143.168

# ---- Authentication ----
# Use long-term credential mechanism
lt-cred-mech

# User credentials (set via environment or replace below)
# Format: username:password
user=${TURN_USERNAME}:${TURN_PASSWORD}

# Realm for authentication
realm=localsend

# ---- Performance ----
# Fingerprint for TURN messages (helps with some firewalls)
fingerprint

# Total allocation quota (in bytes, 0 = unlimited)
total-quota=0

# Max number of simultaneous sessions per user
max-bps=0

# Stale nonce timeout in seconds
stale-nonce=600

# ---- Security ----
# Do not allow TURN on loopback
no-loopback-peers

# Do not allow TURN on private/multicast IPs
no-multicast-peers

# ---- Mobility ----
# Support ICE mobility (connection migration)
mobility

# ---- Logging ----
# Enable verbose logging (set to off in production to reduce noise)
verbose

# Log file path
log-file=/var/log/turnserver/turnserver.log

# ---- Denied Peer IP Ranges (security) ----
# Deny RFC 1918 private ranges
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ---- TLS (disabled by default; enable for production) ----
# cert=/etc/letsencrypt/live/your-domain/fullchain.pem
# pkey=/etc/letsencrypt/live/your-domain/privkey.pem
# tls-listening-port=5349
